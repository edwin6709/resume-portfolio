<section class="about-section">
  <div class="profile-header">
    <h1>{{profile.name}}</h1>
    <h2>{{profile.title}}</h2>
  </div>

  <div class="profile-summary">
    <p>{{profile.summary}}</p>
    
    <button class="toggle-bio" (click)="toggleBio()">
      {{ showFullBio ? 'Show Less' : 'Read More' }}
    </button>
    
    <div class="full-bio" *ngIf="showFullBio">
      <p>Proven ability to deliver high impact projects under tight deadlines.</p>
      <p>Passionate about mentoring and optimizing user facing products.</p>
    </div>
  </div>

  <div class="specialties">
    <h3>Technical Specialties</h3>
    <ul>
      <li *ngFor="let specialty of profile.specialties">{{specialty}}</li>
    </ul>
  </div>

  <div class="stats">
    <div class="stat-item">
      <span class="stat-number">{{profile.yearsOfExperience}}+</span>
      <span class="stat-label">Years Experience</span>
    </div>
  </div>
</section>

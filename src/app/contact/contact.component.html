<section class="contact-section">
  <h2>Get In Touch</h2>
  
<div class="contact-methods">
  <div class="contact-card" *ngFor="let method of contactMethods">
    <span class="contact-icon">{{ getContactIcon(method.icon) }}</span>
    <div class="contact-info">
      <h3>{{ method.label }}</h3>
      <div class="contact-value-container">
        <p (click)="copyToClipboard(method.value, method.id)" 
           [class.clickable]="method.type !== 'text'">
          {{ method.value }}
        </p>
        <span class="copied-message" 
              *ngIf="copiedItemId === method.id">Copied!</span>
      </div>
    </div>
  </div>

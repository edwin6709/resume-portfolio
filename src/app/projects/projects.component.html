<section class="projects-section">
  <h2>Projects</h2>
  
  <div class="projects-grid">
    <div class="project-card" 
         *ngFor="let project of projects; let i = index"
         [class.active]="activeProjectIndex === i">
      <div class="project-header" (click)="setActiveProject(i)">
        <h3>{{ project.title }}</h3>
        <span class="project-date">{{ project.date }}</span>
        <span class="toggle-icon">{{ activeProjectIndex === i ? '−' : '+' }}</span>
      </div>
      
      <div class="project-content" *ngIf="activeProjectIndex === i">
        <p class="project-description">{{ project.description }}</p>
        
        <div class="project-meta">
          <div class="project-role" *ngIf="project.role">
            <strong>Role:</strong> {{ project.role }}
          </div>
          
          <div class="project-technologies">
            <strong>Technologies:</strong>
            <div class="tech-tags">
              <span *ngFor="let tech of project.technologies" 
                    [class]="'tech-tag ' + getTechnologyClass(tech)">
                {{ tech }}
              </span>
            </div>
          </div>
        </div>
        
        <div class="project-features" *ngIf="project.features">
          <strong>Key Features:</strong>
          <ul>
            <li *ngFor="let feature of project.features">{{ feature }}</li>
          </ul>
        </div>
        
        <div class="project-links">
          <a *ngIf="project.liveUrl" 
             [href]="project.liveUrl" 
             target="_blank" 
             class="demo-link">
            Live Demo
          </a>
          <a *ngIf="project.codeUrl" 
             [href]="project.codeUrl" 
             target="_blank" 
             class="code-link">
            View Code
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
